<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="assets/css/style.css">

<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h1>AutoRent</h1>

        </div>
        <nav>

    <script src="assets/js/app.js"></script>
